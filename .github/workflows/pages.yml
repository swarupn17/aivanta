name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to main.
# Live URL will be: https://swarupn17.github.io/aivanta/

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strip internal / source files from deploy
        run: rm -rf docs *.pdf context.md "ASF MD File.md" || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .            # the whole repo root (static HTML/CSS/JS)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
